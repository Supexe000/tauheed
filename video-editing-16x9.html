    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // YouTube lightbox
        document.querySelectorAll('.grid-card').forEach(card => {
            card.addEventListener('click', () => {
                const ytId = card.getAttribute('data-yt');
                if (!ytId) return;
                const lb = document.createElement('div');
                lb.className = 'yt-lightbox';
                lb.innerHTML = `<button class="yt-close" aria-label="Close">&times;</button>
                    <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0"
                    allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>`;
                document.body.appendChild(lb);
                document.body.style.overflow = 'hidden';
                const close = () => { lb.remove(); document.body.style.overflow = ''; };
                lb.querySelector('.yt-close').addEventListener('click', close);
                lb.addEventListener('click', ev => { if (ev.target === lb) close(); });
                document.addEventListener('keydown', function esc(ev) {
                    if (ev.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
                });
            });
        });

        // GSAP scroll animation
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);
            gsap.from('.cat-page-hero > *', { y: 40, opacity: 0, duration: 1, stagger: 0.15, ease: 'power3.out' });
            gsap.from('.grid-card', {
                y: 40, opacity: 0, duration: 0.7, stagger: 0.08, ease: 'power3.out',
                scrollTrigger: { trigger: '.cat-page-grid', start: 'top 85%' }
            });
        }
    </script>
