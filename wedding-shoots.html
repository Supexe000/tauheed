<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding & Event Shoots | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="portfolio-cat.css">
</head>

<body>

    <nav>
        <div class="logo">
            <a href="index.html"><img src="logo.png" alt="Portfolio Logo" id="nav-logo"></a>
        </div>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </nav>

    <header class="cat-page-hero">
        <h1>Wedding & <span class="highlight">Events</span></h1>
        <p>Cinematic coverage of weddings, corporate events, fashion shows & product launches — memories preserved with
            care</p>
    </header>

    <section class="cat-page-grid">
        <div class="grid-wedding">

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/0d0d0d/fd4c11?text=Wedding+Film" alt="Wedding Film"
                    loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Wedding Film</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/111/fd4c11?text=Corporate+Event" alt="Corporate Event"
                    loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Corporate Event</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/111/fd4c11?text=Fashion+Show" alt="Fashion Show" loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Fashion Show</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/111/fd4c11?text=Product+Launch" alt="Product Launch"
                    loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Product Launch</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/111/fd4c11?text=Award+Night" alt="Award Night" loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Award Night</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/0d0d0d/fd4c11?text=Engagement+Shoot" alt="Engagement Shoot"
                    loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Engagement Shoot</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/0d0d0d/fd4c11?text=Mehndi+Night" alt="Mehndi Night"
                    loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Mehndi Night</div>
            </div>

            <div class="grid-card ar-wed">
                <img src="https://placehold.co/900x500/111/fd4c11?text=Gala+Dinner" alt="Gala Dinner" loading="lazy">
                <div class="grid-expand-overlay"><i class="fa-solid fa-expand"></i></div>
                <div class="grid-card-label">Gala Dinner</div>
            </div>

        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        document.querySelectorAll('.grid-card').forEach(card => {
            card.addEventListener('click', () => {
                const img = card.querySelector('img');
                if (!img) return;
                const lb = document.createElement('div');
                lb.className = 'img-lightbox';
                lb.innerHTML = `<button class="yt-close">&times;</button><img src="${img.src}" alt="${img.alt}">`;
                document.body.appendChild(lb);
                document.body.style.overflow = 'hidden';
                const close = () => { lb.remove(); document.body.style.overflow = ''; };
                lb.querySelector('.yt-close').addEventListener('click', close);
                lb.addEventListener('click', ev => { if (ev.target === lb) close(); });
                document.addEventListener('keydown', function esc(ev) {
                    if (ev.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
                });
            });
        });
        if (typeof gsap !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);
            gsap.from('.cat-page-hero > *', { y: 40, opacity: 0, duration: 1, stagger: 0.15, ease: 'power3.out' });
            gsap.from('.grid-card', {
                y: 40, opacity: 0, duration: 0.75, stagger: 0.1, ease: 'power3.out',
                scrollTrigger: { trigger: '.cat-page-grid', start: 'top 85%' }
            });
        }
    </script>
</body>

</html>
